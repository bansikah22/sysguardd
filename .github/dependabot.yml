version: 2

updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - adorsys
    assignees:
      - adorsys
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(deps):"
      prefix-major: "chore(deps):"
      prefix-minor: "chore(deps):"
      prefix-patch: "chore(deps):"
      include: "scope"

  # Dockerfile (if used)
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
