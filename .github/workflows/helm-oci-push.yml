name: Helm Chart OCI Push

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'helm/**'
      - '.github/workflows/helm-oci-push.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Chart version to push (defaults to Chart.yaml version)'
        required: false
        default: ''

env:
  REGISTRY: registry-1.docker.io
  OCI_NAMESPACE: bansikah

jobs:
  push-helm-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Extract chart version
        id: chart_version
        run: |
          if [ -n "${{ github.event.inputs.chart_version }}" ]; then
            VERSION="${{ github.event.inputs.chart_version }}"
          else
            VERSION=$(grep '^version:' helm/Chart.yaml | awk '{print $2}')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Helm Chart Version: ${VERSION}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to OCI registry for Helm
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Package Helm chart
        run: |
          helm package helm/ --version ${{ steps.chart_version.outputs.version }}
          ls -lh sysguardd-*.tgz

      - name: Push Helm chart to OCI registry
        run: |
          CHART_FILE=$(ls sysguardd-*.tgz | head -1)
          echo "Pushing ${CHART_FILE} to OCI registry..."
          
          helm push "${CHART_FILE}" oci://${REGISTRY}/${OCI_NAMESPACE}
          
          echo "Chart pushed successfully"
          echo "Install with:"
          echo "  helm install sysguardd oci://${REGISTRY}/${OCI_NAMESPACE}/sysguardd --version ${{ steps.chart_version.outputs.version }}"

      - name: Verify chart in registry
        run: |
          echo "Verifying chart in registry..."
          helm pull oci://${REGISTRY}/${OCI_NAMESPACE}/sysguardd --version ${{ steps.chart_version.outputs.version }} --untar
          ls -la sysguardd/
          echo "Chart verified in registry"

      - name: Release summary (if release event)
        if: github.event_name == 'release'
        run: |
          echo "Helm chart published to OCI registry"
          echo "Chart Version: ${{ steps.chart_version.outputs.version }}"
          echo "Install with:"
          echo "helm install sysguardd oci://${REGISTRY}/${OCI_NAMESPACE}/sysguardd --version ${{ steps.chart_version.outputs.version }}"
