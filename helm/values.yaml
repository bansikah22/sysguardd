# Default values for sysguardd Helm chart
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: sysguardd
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 0

securityContext:
  privileged: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 0
  capabilities:
    add:
    - SYS_PTRACE
    - KILL
    drop:
    - ALL
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 9100
  targetPort: 9100
  name: metrics

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector:
  kubernetes.io/os: linux

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
        matchExpressions:
        - key: app
          operator: In
          values:
          - sysguardd
      topologyKey: kubernetes.io/hostname

tolerations:
- effect: NoExecute
  operator: Exists
- effect: NoSchedule
  operator: Exists

# Sysguardd-specific configuration
sysguardd:
  mode: monitor  # monitor or enforce - start with monitor and validate
  policyFile: /etc/sysguardd/default.policy
  logLevel: info
  
  # Liveliness probe settings
  liveness:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 30
    failureThreshold: 3
  
  # Readiness probe settings
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 2
  
  # Termination grace period
  terminationGracePeriodSeconds: 30

# Policy configuration
policy:
  enabled: true
  data: |
    # SysGuardd default policy - deny-list based
    # Add deny rules for suspicious executables and paths
    deny_executable=/bin/bash
    deny_executable=/bin/sh
    deny_executable=/usr/bin/nc
    deny_prefix=/proc/sys/kernel
    deny_prefix=/sys/kernel/config

# Update strategy
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
