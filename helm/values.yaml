# Default values for sysguardd Helm chart
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: bansikah/sysguardd
  pullPolicy: IfNotPresent
  tag: "v0.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 0

securityContext:
  privileged: false
  readOnlyRootFilesystem: true
  runAsNonRoot: false
  runAsUser: 0
  capabilities:
    add:
    - SYS_PTRACE
    - KILL
    drop:
    - ALL
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 9100
  targetPort: 9100
  name: metrics

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector:
  kubernetes.io/os: linux

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
        matchExpressions:
        - key: app
          operator: In
          values:
          - sysguardd
      topologyKey: kubernetes.io/hostname

tolerations:
- effect: NoExecute
  operator: Exists
- effect: NoSchedule
  operator: Exists

# Sysguardd-specific configuration
sysguardd:
  mode: monitor  # monitor or enforce - start with monitor and validate
  policyFile: /etc/sysguardd/default.policy
  logLevel: info
  keepStdinOpen: true

  # Node identifier emitted in every audit log line.
  # Defaults to the pod's spec.nodeName via the Downward API when left empty.
  nodeId: ""

  # Optional policy version tag emitted in every audit log line for SIEM correlation.
  policyVersion: ""

  # Real-time webhook alerting (disabled by default).
  # Enable with alert.enabled=true and supply a webhook URL.
  alert:
    enabled: false
    # Inline URL — avoid in production; prefer webhookSecretName instead.
    webhookUrl: ""
    # Name of a Kubernetes Secret with a 'webhook-url' key.
    # When set, the chart mounts the value as SYSGUARDD_ALERT_WEBHOOK_URL.
    webhookSecretName: ""
    # Minimum severity to dispatch: info | warning | critical
    minSeverity: "warning"
    # Suppress duplicate exe+severity alerts within this window (seconds)
    dedupeWindowSec: 60
    # Maximum alerts dispatched per minute (token-bucket rate limit)
    rateLimitPerMinute: 60
  
  # Liveliness probe settings
  liveness:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 30
    failureThreshold: 3
  
  # Readiness probe settings
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 2
  
  # Termination grace period
  terminationGracePeriodSeconds: 30

# Policy configuration
policy:
  enabled: true
  data: |
    # SysGuardd default policy - deny-list based
    # Portable defaults for Ubuntu-based runtimes
    deny_executable=/bin/bash
    deny_executable=/bin/sh
    deny_prefix=/tmp/
    deny_prefix=/dev/shm/

# Update strategy
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
