apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sysguardd
  namespace: kube-system
  labels:
    app: sysguardd
    version: v1
spec:
  selector:
    matchLabels:
      app: sysguardd
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: sysguardd
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    spec:
      serviceAccountName: sysguardd
      hostNetwork: false
      hostPID: false
      
      # Tolerate all taints to run on every node
      tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        operator: Exists
      
      # Only on Linux nodes
      nodeSelector:
        kubernetes.io/os: linux
      
      # Ensure single replica per node
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - sysguardd
            topologyKey: kubernetes.io/hostname
      
      containers:
      - name: sysguardd
        image: bansikah/sysguardd:v0.1.0
        imagePullPolicy: IfNotPresent
        stdin: true
        
        # Run in monitor mode by default; switch to enforce after validation
        args:
        - daemon
        - --mode
        - monitor
        - --policy
        - /etc/sysguardd/default.policy
        
        # Security context: least privilege
        securityContext:
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: false
          runAsUser: 0  # TODO: Eventually drop CAP_KILL and run as unprivileged user
          capabilities:
            add:
            - SYS_PTRACE  # Read /proc/*/exe and process metadata
            - KILL        # Send SIGKILL to enforce policy
            drop:
            - ALL
          allowPrivilegeEscalation: false
        
        # Resource requests/limits
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        # Logging
        env:
        - name: SYSGUARDD_LOG_LEVEL
          value: "info"
        
        # Liveness probe: check daemon responsiveness
        livenessProbe:
          exec:
            command:
            - /usr/local/bin/sysguardd
            - status
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 3
        
        # Readiness probe: ensure policy is loaded
        readinessProbe:
          exec:
            command:
            - /usr/local/bin/sysguardd
            - status
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 2
        
        # Volume mounts
        volumeMounts:
        - name: policy
          mountPath: /etc/sysguardd
          readOnly: true
        - name: audit-logs
          mountPath: /var/log/sysguardd
        - name: proc
          mountPath: /proc
          readOnly: true
        - name: sys
          mountPath: /sys
          readOnly: true
        - name: tmp
          mountPath: /tmp
      
      # Volumes
      volumes:
      - name: policy
        configMap:
          name: sysguardd-policy
          defaultMode: 0444
      - name: audit-logs
        emptyDir: {}
      - name: proc
        hostPath:
          path: /proc
          type: Directory
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 256Mi
      
      # Termination grace period
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: sysguardd-metrics
  namespace: kube-system
  labels:
    app: sysguardd
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for Prometheus scrape
  selector:
    app: sysguardd
  ports:
  - name: metrics
    port: 9100
    targetPort: 9100
    protocol: TCP
